name: Load Philosophy Weeks

on:
  push:
    branches: [main]
    paths:
      - 'courant_philosophiques/weeks/week*.md'
  schedule:
    # Every Monday at 6:00 UTC (7:00 AM Paris) as safety net
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  load-weeks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Load new weeks and generate TTS
        run: node scripts/load-all-weeks.js
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
